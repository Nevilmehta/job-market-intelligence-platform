services:
  api:
    build: .
    container_name: job_market_api
    ports: 
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:16
    container_name: job_market_db
    environment:
      POSTGRES_DB: job_market_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: job_market_redis
    ports:
      - "6379:6379"

  worker:
    build: .
    container_name: job_market_worker
    env_file: 
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info --pool=solo

  beat:
    build: .
    container_name: job_market_beat
    env_file: 
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
    command: celery -A app.tasks.celery_app.celery_app beat --loglevel=info

volumes:
  postgres_data: 